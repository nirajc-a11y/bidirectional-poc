<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Outbound AI Calling System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128222;</text></svg>">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="notificationArea" class="notification-area"></div>
    <div id="modalContainer"></div>

    <header>
        <h1>Outbound AI Calling System</h1>
        <div class="header-controls">
            <label class="upload-btn">
                Upload CSV
                <input type="file" id="csvUpload" accept=".csv" hidden>
            </label>
            <button id="startBtn" class="btn btn-start" disabled>Start Calls</button>
            <button id="pauseBtn" class="btn btn-pause" disabled>Pause</button>
            <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
        </div>
    </header>

    <div class="status-bar" id="statusBar">
        <span class="connection-dot" id="connectionDot"></span>
        <span id="statusText">Upload a CSV to begin</span>
    </div>

    <main class="panels">
        <!-- Call Queue -->
        <section class="panel queue-panel">
            <h2>Call Queue</h2>
            <span class="progress-text" id="progressText" style="display:none">0 / 0</span>
            <div class="progress-bar-container" id="progressContainer" style="display:none">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="queue-list" id="queueList">
                <p class="empty-state">No claims loaded</p>
            </div>
        </section>

        <!-- Live Call -->
        <section class="panel live-panel">
            <h2>Live Call</h2>
            <div class="call-info" id="callInfo" style="display:none">
                <div class="call-meta">
                    <span class="label">Patient</span> <span id="livePatient">-</span>
                </div>
                <div class="call-meta">
                    <span class="label">Claim</span> <span id="liveClaim">-</span>
                </div>
                <div class="call-meta">
                    <span class="label">Phone</span> <span id="livePhone">-</span>
                </div>
                <div class="call-meta">
                    <span class="label">Duration</span> <span id="liveDuration">00:00</span>
                </div>
            </div>
            <div class="transcript-feed" id="transcriptFeed">
                <p class="empty-state">No active call</p>
            </div>
        </section>

        <!-- Results -->
        <section class="panel results-panel">
            <h2>Results</h2>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card stat-approved">
                    <div class="stat-value" id="statApproved">0</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card stat-denied">
                    <div class="stat-value" id="statDenied">0</div>
                    <div class="stat-label">Denied</div>
                </div>
                <div class="stat-card stat-pending">
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card stat-failed">
                    <div class="stat-value" id="statFailed">0</div>
                    <div class="stat-label">Failed</div>
                </div>
                <div class="stat-card stat-no-answer">
                    <div class="stat-value" id="statNoAnswer">0</div>
                    <div class="stat-label">No Answer</div>
                </div>
            </div>
            <button class="btn btn-download" id="downloadBtn" disabled>Download Updated CSV</button>
            <div class="results-list" id="resultsList"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
