<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Outbound AI Calling System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1d1d1f;
        }
        .login-card {
            background: #fff;
            border: 1px solid #e8e8ed;
            border-radius: 14px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        .login-card h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .login-card p {
            font-size: 14px;
            color: #656d76;
            margin-bottom: 24px;
        }
        .login-card label {
            font-size: 13px;
            font-weight: 500;
            color: #656d76;
            display: block;
            margin-bottom: 6px;
        }
        .login-card input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.15s;
            background: #f6f8fa;
        }
        .login-card input:focus {
            border-color: #0969da;
            background: #fff;
            box-shadow: 0 0 0 2px rgba(9,105,218,0.12);
        }
        .login-card button {
            width: 100%;
            padding: 10px;
            background: #0969da;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.15s;
        }
        .login-card button:hover {
            background: #0860c7;
        }
        .error-msg {
            color: #cf222e;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Outbound AI Caller</h1>
        <p>Enter the dashboard password to continue.</p>
        <form method="POST" action="/login">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required autofocus>
            <button type="submit">Sign In</button>
        </form>
        <p class="error-msg" id="errorMsg">Incorrect password. Try again.</p>
        <script>
            if (document.referrer) {
                try {
                    if (new URL(document.referrer).pathname === '/login') {
                        document.getElementById('errorMsg').style.display = 'block';
                    }
                } catch(e) {}
            }
        </script>
    </div>
</body>
</html>
